<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 宏观分析 - 茗心的数学成长乐园</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px; text-align: center; }
        .header h1 { color: #667eea; font-size: 2em; margin-bottom: 10px; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        .card h2 { color: #333; margin-bottom: 20px; border-bottom: 3px solid #667eea; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-box { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px; border-radius: 15px; text-align: center; }
        .stat-box .num { font-size: 2.5em; font-weight: bold; }
        .chart-container { width: 100%; height: 350px; }
        .back-btn { display: inline-block; padding: 10px 25px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; text-decoration: none; border-radius: 25px; margin-bottom: 20px; }
        .loading { text-align: center; padding: 40px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <a href="index.html" class="back-btn">← 返回首页</a>
            
            <div class="header">
                <h1>🎓 宏观分析仪表盘</h1>
                <p>深度分析 · 成绩预测 · 风险预警</p>
            </div>
            
            <div v-if="loading" class="loading"><div class="spinner"></div><p>加载中...</p></div>
            
            <template v-else>
                <div class="stats-grid">
                    <div class="stat-box"><div class="num">{{ dashboard.percentile }}%</div><div>百分位排名</div></div>
                    <div class="stat-box"><div class="num">{{ dashboard.predicted }}</div><div>预测分数</div></div>
                    <div class="stat-box"><div class="num">{{ dashboard.avg }}</div><div>平均分</div></div>
                    <div class="stat-box"><div class="num">{{ dashboard.cv }}%</div><div>波动率</div></div>
                </div>
                
                <div class="card">
                    <h2>⚠️ 风险预警</h2>
                    <div :class="['risk-box', dashboard.risk_level]" style="padding: 20px; border-radius: 15px; text-align: center; background: #fef2f2; border: 2px solid #fecaca;">
                        <div style="font-size: 3em;">{{ dashboard.risk_emoji }}</div>
                        <div style="font-size: 1.5em; font-weight: bold; margin: 10px 0;">{{ dashboard.risk_message }}</div>
                        <div>风险分数：{{ dashboard.risk_score }}</div>
                    </div>
                </div>
                
                <div class="card">
                    <h2>📊 学年对比</h2>
                    <div id="semesterChart" class="chart-container"></div>
                </div>
                
                <div class="card">
                    <h2>💡 学习建议</h2>
                    <div v-for="(advice, i) in dashboard.advice" :key="i" style="padding: 15px; margin: 10px 0; border-left: 4px solid #667eea; background: #f8f9ff; border-radius: 0 10px 10px 0;">
                        <div style="font-weight: bold; color: #333;">{{ advice.title }}</div>
                        <div style="color: #666; margin-top: 5px;">{{ advice.content }}</div>
                    </div>
                </div>
            </template>
        </div>
    </div>
    
    <script>
        const API = 'https://5fb7-2408-8956-71-1c1d-9183-7145-4b64-6689.ngrok-free.app';
        
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    loading: false,
                    dashboard: {
                        percentile: 0,
                        predicted: 0,
                        avg: 0,
                        cv: 0,
                        risk_level: 'safe',
                        risk_emoji: '🟢',
                        risk_message: '状态良好',
                        risk_score: 0,
                        advice: []
                    }
                }
            },
            mounted() {
                this.loadDashboard();
            },
            methods: {
                async loadDashboard() {
                    this.loading = true;
                    try {
                        const r = await fetch(`${API}/advanced/dashboard/3`);
                        const data = await r.json();
                        
                        this.dashboard.percentile = data.percentile?.percentile || 0;
                        this.dashboard.predicted = data.prediction?.predicted_score || 0;
                        this.dashboard.avg = data.stability?.mean_score || 0;
                        this.dashboard.cv = data.stability?.cv || 0;
                        
                        const risk = data.risk || {};
                        this.dashboard.risk_score = risk.risk_score || 0;
                        this.dashboard.risk_message = risk.message || '状态良好';
                        
                        if (risk.risk_level === 'high') {
                            this.dashboard.risk_level = 'risk-high';
                            this.dashboard.risk_emoji = '🔴';
                        } else if (risk.risk_level === 'medium') {
                            this.dashboard.risk_level = 'risk-medium';
                            this.dashboard.risk_emoji = '🟠';
                        } else if (risk.risk_level === 'low') {
                            this.dashboard.risk_level = 'risk-low';
                            this.dashboard.risk_emoji = '🟡';
                        }
                        
                        this.dashboard.advice = data.advice || [];
                        
                        if (data.semester_stats?.semester_stats) {
                            this.$nextTick(() => {
                                this.renderSemesterChart(data.semester_stats.semester_stats);
                            });
                        }
                    } catch (e) {
                        console.error('加载失败:', e);
                        alert('加载数据失败，请检查后端是否运行');
                    } finally {
                        this.loading = false;
                    }
                },
                renderSemesterChart(data) {
                    const chart = echarts.init(document.getElementById('semesterChart'));
                    chart.setOption({
                        title: { text: '各学期成绩趋势', left: 'center', textStyle: { fontSize: 16 } },
                        tooltip: { trigger: 'axis' },
                        xAxis: { 
                            type: 'category', 
                            data: data.map(d => d.semester),
                            axisLabel: { rotate: 45, interval: 0 }
                        },
                        yAxis: { type: 'value', min: 0, max: 100, name: '分数' },
                        grid: { left: '10%', right: '10%', bottom: '20%', top: '15%' },
                        series: [{
                            type: 'bar',
                            data: data.map(d => d.avg_score),
                            itemStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: '#667eea' },
                                    { offset: 1, color: '#764ba2' }
                                ]),
                                borderRadius: [10, 10, 0, 0]
                            }
                        }, {
                            type: 'line',
                            data: data.map(d => d.avg_score),
                            smooth: true,
                            itemStyle: { color: '#f59e0b' },
                            lineStyle: { width: 3 }
                        }]
                    });
                    
                    window.addEventListener('resize', () => {
                        chart.resize();
                    });
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
