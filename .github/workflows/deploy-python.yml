name: Deploy Python Only

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install requests
      run: pip install requests
    - name: Deploy to Aliyun
      run: python deploy_api.py
