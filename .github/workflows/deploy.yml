name: Deploy to Aliyun FC

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install Aliyun CLI
      run: |
        pip install aliyun-python-sdk-fc aliyun-python-sdk-core
    
    - name: Deploy to FC
      env:
        ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
        ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        REGION: cn-hangzhou
      run: |
        python deploy_fc.py