name: Deploy to Aliyun FC

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt -t .
    
    - name: Deploy using CLI
      uses: aliyun/aliyun-cli-action@v1
      with:
        access_key_id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
        access_key_secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        region: cn-hangzhou
        command: fc function deploy --service-name math-score --function-name api --code-dir backend