services:
  - type: web
    name: math-score-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PORT
        value: 8808
    disk:
      name: database
      mountPath: /opt/render/project/src
      sizeGB: 1
